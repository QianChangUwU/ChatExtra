name: Build and release

on:
  push:
    branches: [main, master, dev]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE*'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Force create release even if tag exists'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

env:
  BRANCH: ${{ github.ref_name }}

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      tag: ${{ steps.build-tag.outputs.tag }}
      tag-exists: ${{ steps.check-tag.outputs.exists }}
      should-release: ${{ steps.check-release.outputs.should-release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from VERSION file
        id: get-version
        run: |
          VERSION=$(head -1 VERSION | tr -d '\r' | xargs)
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from VERSION file"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Detected version: $VERSION"

      - name: Build tag name
        id: build-tag
        run: |
          BASE="v${{ steps.get-version.outputs.version }}"
          if [ "${{ env.BRANCH }}" = "dev" ]; then
            TAG="${BASE}-dev"
          else
            TAG="$BASE"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Check if tag already exists
        id: check-tag
        run: |
          TAG="${{ steps.build-tag.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine if release should be created
        id: check-release
        run: |
          FORCE_RELEASE="${{ github.event.inputs.force_release }}"
          TAG_EXISTS="${{ steps.check-tag.outputs.exists }}"
          if [ "$FORCE_RELEASE" = "true" ] || [ "$TAG_EXISTS" = "false" ]; then
            echo "should-release=true" >> $GITHUB_OUTPUT
          else
            echo "should-release=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-version
    if: needs.detect-version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.detect-version.outputs.version }}
      TAG: ${{ needs.detect-version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore NuGet packages
        run: dotnet restore client/ExtraChat-CN/ExtraChat-CN.csproj

      - name: Download and setup Dalamud
        run: |
          wget -q https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -O dalamud.zip
          unzip -q dalamud.zip -d .dalamud
          echo "DALAMUD_HOME=$PWD/.dalamud/" >> $GITHUB_ENV

      - name: Build
        run: |
          dotnet build client/ExtraChat-CN/ExtraChat-CN.csproj \
            -c Release \
            -p:TargetFramework=net10.0-windows7.0 \
            -p:DALAMUD_HOME=$DALAMUD_HOME

      - name: Package plugin
        run: |
          mkdir -p release
          cd client/ExtraChat-CN/bin/Release
          rm -f ExtraChat.json ExtraChat.deps.json ExtraChat.pdb
          rm -rf ExtraChat
          zip -r $OLDPWD/release/ExtraChat-CN.zip \
            ExtraChat-CN.dll \
            ExtraChat-CN.json \
            ExtraChat-CN.deps.json \
            ASodium.dll \
            MessagePack.dll \
            MessagePack.Annotations.dll \
            Microsoft.NET.StringTools.dll \
            runtimes/win-x64/
          cd $OLDPWD
          ls -la release/

      - name: Generate checksums
        run: |
          cd release
          for file in *; do
            if [ -f "$file" ]; then
              sha256sum "$file" > "$file.sha256"
            fi
          done

      - name: Create and push tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ "${{ needs.detect-version.outputs.tag-exists }}" = "true" ]; then
            git tag -d $TAG || true
            git push origin :refs/tags/$TAG || true
          fi
          git tag $TAG -m "Release version ${VERSION}"
          git push origin $TAG

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "ExtraChat v${{ env.VERSION }} (${{ env.BRANCH }})"
          body: |
            ## ExtraChat v${{ env.VERSION }}

            Automated ${{ env.BRANCH }} release.
          files: |
            release/*
          draft: false
          prerelease: ${{ env.BRANCH == 'dev' }}

      - name: Publish to DalamudPlugins repo
        uses: actions/checkout@v4
        with:
          repository: QianChangUwU/DalamudPlugins
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          path: dalamud-plugins

      - name: Set channel
        id: set-channel
        run: |
          if [ "${{ env.BRANCH }}" = "dev" ]; then
            echo "channel=testing" >> $GITHUB_OUTPUT
          else
            echo "channel=stable" >> $GITHUB_OUTPUT
          fi

      - name: Update pluginmaster.json
        run: |
          python3 .github/update_pluginmaster.py \
            dalamud-plugins \
            "${{ env.VERSION }}" \
            "${{ github.repository }}" \
            "${{ steps.set-channel.outputs.channel }}" \
            "${{ env.TAG }}"

      - name: Commit and push to DalamudPlugins
        run: |
          cd dalamud-plugins
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pluginmaster.json
          git diff --cached --quiet || git commit -m "Update ExtraChat to v${TAG}"
          git push
